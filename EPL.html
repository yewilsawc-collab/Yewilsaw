
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elementa Pro v2.0 | Gemini AI</title>
    <!-- Lucide Icons for modern UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Core Palette */
            --bg: #0a0a0a;
            --panel: #141414;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --drawer-w: 280px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        [data-theme="light"] {
            --bg: #f3f4f6;
            --panel: #ffffff;
            --accent: #2563eb;
            --text-main: #111827;
            --text-dim: #4b5563;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(0, 0, 0, 0.02);
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            height: 100dvh; display: flex; overflow: hidden; 
            transition: background 0.3s ease;
        }

        /* --- Layout Architecture --- */
        #container { 
            display: flex; width: 100%; height: 100%; 
            position: relative;
        }

        #main { 
            flex: 1; display: flex; flex-direction: column; 
            min-width: 0; position: relative; height: 100%;
            transition: margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Sidebar / Drawers --- */
        .drawer {
            position: fixed; top: 0; bottom: 0; width: var(--drawer-w);
            background: var(--panel); border-right: 1px solid var(--border);
            z-index: 3000; display: flex; flex-direction: column;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
            padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
        }
        /* Right Drawer Styling */
        .glass-input {
  width: 100%;
  padding: 10px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  box-sizing: border-box;
  background-color: var(--bg-surface);
  color: var(--text-main);
  margin-bottom: 15px;
}
.settings-label {
    color: var(--text-dim);
    font-size: 0.9rem;
    text-transform: uppercase;
    margin-bottom: 5px;
}
.scroll-area select {
    width:100%; 
    padding: 10px; 
    background: #1c1c1c; 
    color: white; 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    border-radius: 8px;
    margin-bottom: 15px;
}


        #drawer-left { left: 0; transform: translate3d(-105%, 0, 0); }
        #drawer-right { right: 0; transform: translate3d(105%, 0, 0); border-left: 1px solid var(--border); }
        .drawer.open { transform: translate3d(0, 0, 0) !important; }

        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            opacity: 0; pointer-events: none; transition: opacity 0.35s ease; 
            z-index: 1500; backdrop-filter: blur(8px);
        }
        #overlay.active { opacity: 1; pointer-events: auto; }

        /* --- Header --- */
        header { 
            height: 64px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; border-bottom: 1px solid var(--border);
            background: var(--glass); backdrop-filter: blur(12px);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #4285f4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
            font-weight: 800; font-size: 1.1rem;
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        /* --- Chat Output Area --- */
        #output { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth;
        }

        .msg-row { display: flex; width: 100%; flex-direction: column; }
        .msg { 
            max-width: 85%; padding: 14px 18px; border-radius: 18px; 
            font-size: 0.95rem; line-height: 1.6; position: relative;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } }

        .user-msg { 
            align-self: flex-end; background: var(--accent); color: white;
            border-bottom-right-radius: 4px; 
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .bot-msg { 
            align-self: flex-start; background: var(--glass); 
            border: 1px solid var(--border); border-bottom-left-radius: 4px; 
        }

        /* --- Markdown Styling --- */
        pre { 
            background: #0d1117; color: #e6edf3; padding: 35px 15px 15px; 
            border-radius: 12px; margin: 12px 0; overflow-x: auto; position: relative;
            font-family: 'Fira Code', monospace; font-size: 0.85rem;
        }
        .code-header {
            position: absolute; top: 0; left: 0; right: 0; height: 30px;
            background: rgba(255,255,255,0.05); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 12px;
            font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim);
        }
        .copy-btn { cursor: pointer; color: var(--accent); font-weight: 600; }
        .copy-btn:hover { text-decoration: underline; }

        /* --- Input Area --- */
        .input-wrapper { 
            padding: 16px 20px calc(16px + var(--safe-bottom)); 
            border-top: 1px solid var(--border); background: var(--panel);
        }
        .input-bar {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 24px; padding: 8px 16px; display: flex; align-items: flex-end; gap: 12px;
            transition: border-color 0.3s;
        }
        .input-bar:focus-within { border-color: var(--accent); }

        textarea { 
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-main); padding: 8px 0; resize: none;
            max-height: 150px; font-size: 1rem;
        }

        .action-btn {
            background: transparent; border: none; color: var(--text-dim);
            cursor: pointer; padding: 8px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .action-btn:hover { background: var(--border); color: var(--accent); }
        .send-btn { color: var(--accent); transform: rotate(45deg); }

        /* --- Canvas System --- */
        #canvas {
            position: fixed; right: 0; top: 0; bottom: 0; width: 50%;
            background: white; transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2000; border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        body.canvas-open #canvas { transform: translateX(0); }
        body.canvas-open #main { margin-right: 50%; }

        #canvas-header {
            height: 50px; background: #f8f9fa; border-bottom: 1px solid #ddd;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            color: #333; font-weight: 600;
        }

        /* --- Features & Utilities --- */
        .typing-indicator {
            display: none; padding: 10px; gap: 4px;
        }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        #preview-pill {
            display: none; background: var(--glass); padding: 8px 12px;
            border-radius: 12px; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .preview-img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }

        /* --- History Search --- */
        .search-box {
            padding: 15px; border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 12px; color: white; outline: none;
        }

        .history-item {
            padding: 12px 15px; border-bottom: 1px solid var(--border);
            cursor: pointer; font-size: 0.85rem; transition: 0.2s;
            display: flex; align-items: center; gap: 10px; color: var(--text-dim);
        }
        .history-item:hover { background: var(--glass); color: var(--text-main); }
        .history-item.active { border-left: 3px solid var(--accent); background: var(--glass); color: var(--accent); }

        @media (max-width: 768px) {
            body.canvas-open #main { margin-right: 0; }
            #canvas { width: 100%; }
            .drawer { width: 85%; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeAll()"></div>

<!-- Left Sidebar: History -->
<aside id="drawer-left" class="drawer">
    <div class="search-box">
        <input type="text" id="history-search" placeholder="Search chats..." oninput="filterHistory()">
    </div>
    <div id="history-list" style="flex:1; overflow-y:auto;">
        <!-- Items dynamic -->
    </div>
    <div style="padding: 15px;">
        <button onclick="createNewChat()" style="width:100%; background: var(--accent); color:white; border:none; padding:12px; border-radius:12px; cursor:pointer; font-weight:600;">+ New Chat</button>
    </div>
</aside>

<!-- Right Sidebar: Settings -->
<aside id="drawer-right" class="drawer">
    <div style="padding: 20px; border-bottom: 1px solid var(--border);">
        <h3>Settings</h3>
    </div>
    <div style="padding: 20px; display:flex; flex-direction:column; gap:20px;">
        <div>
            <label style="font-size:0.7rem; color: var(--text-dim); display:block; margin-bottom:8px;">GEMINI API KEY</label>
            <input type="password" id="api-key" placeholder="Enter Key..." style="width:100%; background: var(--glass); border:1px solid var(--border); color:white; padding:10px; border-radius:8px;">
        </div>
        <div>
            <label style="font-size:0.7rem; color: var(--text-dim); display:block; margin-bottom:8px;">MODEL</label>
            <select id="model-select" style="width:100%; background: var(--glass); border:1px solid var(--border); color:white; padding:10px; border-radius:8px;">
                <option value="gemini-2.5-flash-preview">Gemini 2.5 Flash Preview</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-3-flash-preview">Gemini 3 Flash preview</option>
            </select>
        </div>
        <div>
            <label style="font-size:0.7rem; color: var(--text-dim); display:block; margin-bottom:8px;">SYSTEM ROLE</label>
            <textarea id="system-prompt" style="width:100%; background: var(--glass); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; height:80px;">You are a professional full-stack developer. When asked to create code, provide it in clear Markdown blocks.</textarea>
        </div>
        <button onclick="saveSettings()" style="background: var(--accent); color:white; border:none; padding:12px; border-radius:12px; cursor:pointer;">Save Changes</button>
        <button onclick="toggleTheme()" style="background: var(--glass); color: var(--text-main); border:1px solid var(--border); padding:12px; border-radius:12px; cursor:pointer;">Toggle Light/Dark</button>
    </div>
</aside>

<div id="main">
    <header>
        <button class="action-btn" onclick="toggleDrawer('left')"><i data-lucide="menu"></i></button>
        <div class="shimmer-text">ELEMENTA PRO</div>
        <button class="action-btn" onclick="toggleDrawer('right')"><i data-lucide="settings"></i></button>
    </header>

    <div id="output">
        <!-- Messages appear here -->
        <div style="margin: auto; text-align: center; color: var(--text-dim);">
            <i data-lucide="sparkles" style="width:48px; height:48px; margin-bottom:10px; opacity:0.5;"></i>
            <p>Ready to build something amazing?</p>
        </div>
    </div>

    <div id="typing" class="typing-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="input-wrapper">
        <div id="preview-pill">
            <img id="img-preview" class="preview-img">
            <span id="img-name" style="font-size:0.8rem; flex:1"></span>
            <button onclick="clearImage()" style="background:none; border:none; color:#ef4444; cursor:pointer;">✕</button>
        </div>
        
        <div class="input-bar">
            <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">
            <button class="action-btn" onclick="document.getElementById('file-input').click()"><i data-lucide="paperclip"></i></button>
            <button class="action-btn" id="mic-btn" onclick="toggleDictation()"><i data-lucide="mic"></i></button>
            
            <textarea id="user-input" placeholder="Ask anything..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
            
            <button class="action-btn send-btn" onclick="handleSendMessage()"><i data-lucide="send"></i></button>
        </div>
    </div>
</div>

<div id="canvas">
    <div id="canvas-header">
        <span>Artifact Preview</span>
        <button onclick="closeCanvas()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">✕</button>
    </div>
    <iframe id="canvas-frame" style="flex:1; border:none; width:100%; background:white;"></iframe>
</div>

<script>
    // --- State Management ---
    let chats = JSON.parse(localStorage.getItem('elementa_chats')) || [];
    let activeChatId = null;
    let isGenerating = false;
    let stagedImage = null;
    let recognition = null;

    // --- Initialization ---
    window.onload = () => {
        lucide.createIcons();
        loadSettings();
        renderHistory();
        if (chats.length > 0) switchChat(chats[0].id);
        setupSTT();
    };

    function loadSettings() {
        document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';
        document.getElementById('model-select').value = localStorage.getItem('gemini_model') || 'gemini-2.0-flash';
        document.getElementById('system-prompt').value = localStorage.getItem('gemini_system') || 'You are a professional full-stack developer.';
    }

    function saveSettings() {
        localStorage.setItem('gemini_key', document.getElementById('api-key').value);
        localStorage.setItem('gemini_model', document.getElementById('model-select').value);
        localStorage.setItem('gemini_system', document.getElementById('system-prompt').value);
        alert('Settings Saved!');
        closeAll();
    }

    // --- UI Controls ---
    function toggleDrawer(id) {
        document.getElementById(`drawer-${id}`).classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function closeAll() {
        document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
        document.getElementById('overlay').classList.remove('active');
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSendMessage();
        }
    }

  
// --- Chat Logic ---
async function handleSendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    const key = localStorage.getItem('gemini_key');
    
    if (!key) return alert("Please set an API Key in settings.");
    if (!text && !stagedImage) return;
    if (isGenerating) return;
    
    isGenerating = true;
    if (!activeChatId) createNewChat();
    
    const userMsg = { role: 'user', content: text, image: stagedImage };
    addMessageToUI('user', text, stagedImage);
    updateChatHistory(activeChatId, userMsg);
    
    resetInput(input);
    
    try {
        showTyping(true);
        const response = await fetchGemini(activeChatId);
        showTyping(false);
        
        addMessageToUI('bot', response);
        updateChatHistory(activeChatId, { role: 'model', content: response });
        
        // Render HTML code in canvas if present
        const codeMatch = response.match(/```(?:html)?\n([\s\S]*?)```/);
        if (codeMatch) openCanvas(codeMatch[1]);
        
    } catch (err) {
        showTyping(false);
        addMessageToUI('bot', "Error: " + err.message);
    } finally {
        isGenerating = false;
    }
}

// --- API Call ---
async function fetchGemini(chatId) {
    const chat = chats.find(c => c.id === chatId);
    const key = localStorage.getItem('gemini_key');
    const model = localStorage.getItem('gemini_model');
    const system = localStorage.getItem('gemini_system');
    
    const contents = chat.messages.map(m => {
        const parts = [{ text: m.content || "Analyze this image" }];
        if (m.image) {
            parts.push({
                inline_data: {
                    mime_type: m.image.type,
                    data: m.image.base64.split(',')[1]
                }
            });
        }
        return { role: m.role === 'user' ? 'user' : 'model', parts };
    });
    
    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents,
                systemInstruction: { parts: [{ text: system }] },
                generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
            })
        }
    );
    
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    
    const candidate = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!candidate) throw new Error("No response from Gemini");
    
    return candidate;
}

// --- UI Rendering ---
function addMessageToUI(role, text, image = null) {
    const output = document.getElementById('output');
    const row = document.createElement('div');
    row.className = 'msg-row';
    
    const bubble = document.createElement('div');
    bubble.className = `msg ${role}-msg`;
    
    if (image) {
        const img = document.createElement('img');
        img.src = image.base64;
        img.style = "width:100%; border-radius:10px; margin-bottom:10px;";
        bubble.appendChild(img);
    }
    
    const textDiv = document.createElement('div');
    textDiv.innerHTML = parseMarkdown(text);
    bubble.appendChild(textDiv);
    
    if (role === 'bot') bubble.appendChild(createBotActions());
    
    row.appendChild(bubble);
    output.appendChild(row);
    output.scrollTop = output.scrollHeight;
    
    lucide.createIcons();
}

// --- Utilities ---
function resetInput(input) {
    input.value = '';
    input.style.height = 'auto';
    clearImage();
}

function showTyping(show) {
    document.getElementById('typing').style.display = show ? 'flex' : 'none';
}

function createBotActions() {
    const actions = document.createElement('div');
    actions.style = "margin-top:10px; display:flex; gap:10px; opacity:0.6";
    actions.innerHTML = `
    <button onclick="speakText(this)" style="background:none; border:none; color:inherit; cursor:pointer;">
      <i data-lucide="volume-2" style="width:14px"></i>
    </button>
    <button onclick="copyRaw(this)" style="background:none; border:none; color:inherit; cursor:pointer;">
      <i data-lucide="copy" style="width:14px"></i>
    </button>
  `;
    return actions;
}

// --- Init ---
document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
});
function parseMarkdown(text) {
// Simple but effective parser for demo
return text
.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
const id = 'code-' + Math.random().toString(36).substr(2, 5);
return `<pre id="${id}"><div class="code-header"><span>${lang || 'code'}</span><span class="copy-btn" onclick="copyCode('${id}')">COPY</span></div><code>${escapeHtml(code.trim())}</code></pre>`;
})
.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
.replace(/\n/g, '<br>');
}

function escapeHtml(unsafe) {
return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

// --- History & Data Management ---
function createNewChat() {
const id = Date.now().toString();
const newChat = { id, title: 'New Conversation', messages: [] };
chats.unshift(newChat);
activeChatId = id;
document.getElementById('output').innerHTML = '';
saveChats();
renderHistory();
closeAll();
}

function switchChat(id) {
activeChatId = id;
const chat = chats.find(c => c.id === id);
const output = document.getElementById('output');
output.innerHTML = '';
chat.messages.forEach(m => addMessageToUI(m.role === 'user' ? 'user' : 'bot', m.content, m.image));
renderHistory();
closeAll();
}

function updateChatHistory(chatId, message) {
const chat = chats.find(c => c.id === chatId);
if (chat) {
chat.messages.push(message);
if (chat.messages.length === 1) chat.title = message.content.slice(0, 30) + '...';
saveChats();
renderHistory();
}
}

function saveChats() {
localStorage.setItem('elementa_chats', JSON.stringify(chats));
}

function renderHistory() {
const list = document.getElementById('history-list');
list.innerHTML = chats.map(c => `
<div class="history-item ${c.id === activeChatId ? 'active' : ''}" onclick="switchChat('${c.id}')">
<i data-lucide="message-square" style="width:14px"></i>
<span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</span>
</div>
`).join('');
lucide.createIcons();
}

function filterHistory() {
const term = document.getElementById('history-search').value.toLowerCase();
const items = document.querySelectorAll('.history-item');
items.forEach(item => {
const text = item.innerText.toLowerCase();
item.style.display = text.includes(term) ? 'flex' : 'none';
});
}

// --- Media & Advanced Features ---
function handleFile(input) {
const file = input.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = (e) => {
stagedImage = { base64: e.target.result, type: file.type, name: file.name };
document.getElementById('preview-pill').style.display = 'flex';
document.getElementById('img-preview').src = e.target.result;
document.getElementById('img-name').innerText = file.name;
};
reader.readAsDataURL(file);
}

function clearImage() {
stagedImage = null;
document.getElementById('preview-pill').style.display = 'none';
document.getElementById('file-input').value = '';
}

function openCanvas(html) {
document.body.classList.add('canvas-open');
const frame = document.getElementById('canvas-frame');
const blob = new Blob([html], { type: 'text/html' });
frame.src = URL.createObjectURL(blob);
}

function closeCanvas() {
document.body.classList.remove('canvas-open');
}

function speakText(btn) {
const text = btn.closest('.msg').innerText;
const utterance = new SpeechSynthesisUtterance(text);
speechSynthesis.speak(utterance);
}

function setupSTT() {
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
recognition = new SpeechRecognition();
recognition.continuous = false;
recognition.onresult = (event) => {
const transcript = event.results[0][0].transcript;
document.getElementById('user-input').value += transcript;
toggleDictation();
};
}
}

function toggleDictation() {
const btn = document.getElementById('mic-btn');
if (btn.classList.contains('active')) {
recognition.stop();
btn.classList.remove('active');
btn.style.color = '';
} else {
recognition.start();
btn.classList.add('active');
btn.style.color = '#ef4444';
}
}

window.copyCode = (id) => {
const code = document.querySelector(`#${id} code`).innerText;
navigator.clipboard.writeText(code);
const btn = document.querySelector(`#${id} .copy-btn`);
btn.innerText = 'COPIED!';
setTimeout(() => btn.innerText = 'COPY', 2000);
};
</script>
