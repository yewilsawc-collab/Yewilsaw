
<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>The Elementa Pub - Joke Machine</title> 
<style> 
:root { --beer-gold: #f3af09; --foam-white: #ffffff; --bar-wood: #3e2723; --neon-pink: #ff00ff; } body { background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; } .pub-sign { background: var(--bar-wood); padding: 2rem; border: 8px solid #5d4037; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 10px var(--beer-gold); text-align: center; max-width: 500px; width: 90%; } h1 { color: var(--beer-gold); text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0px #000; margin-top: 0; } #joke-display { font-size: 1.2rem; min-height: 100px; display: flex; align-items: center; justify-content: center; margin: 20px 0; line-height: 1.5; font-style: italic; } button { background: var(--beer-gold); border: none; padding: 15px 30px; font-size: 1rem; font-weight: bold; color: var(--bar-wood); border-radius: 5px; cursor: pointer; transition: transform 0.1s, background 0.3s; box-shadow: 0 4px 0 #b37e00; } button:hover { background: #ffc107; } button:active { transform: translateY(4px); box-shadow: none; } .mug-icon { font-size: 3rem; margin-bottom: 10px; } </style> </head> <body> <div class="pub-sign"> <div class="mug-icon">🍺</div> <h1>Elementa's Pub</h1> <div id="joke-display">Click the button for a cold one...</div> <button onclick="pourJoke()">Next Round!</button> </div> <script> const jokes = [ "A guy walks into a bar and orders a 'root beer' in a square glass. The bartender says, 'Now you just have beer.'", "A skeleton walks into a bar and orders a beer and a mop.", "A dyslexic man walks into a bra.", "Two termites walk into a bar. One asks, 'Is the bar tender here?'", "The past, the present, and the future walk into a bar. It was tense.", "A neutron walks into a bar and asks, 'How much for a beer?' The bartender says, 'For you? No charge!'", "An Irishman walks out of a bar. (Hey, it could happen!)", "A ghost walks into a bar and orders a bourbon. The bartender says, 'Sorry, we don't serve spirits.'" ]; function pourJoke() { const display = document.getElementById('joke-display'); const randomIndex = Math.floor(Math.random() * jokes.length); // Add a little fade effect display.style.opacity = 0; setTimeout(() => { display.innerText = jokes[randomIndex]; display.style.opacity = 1; }, 200); } </script> </body> </html>
