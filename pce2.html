<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elementa Integrated Pro</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #3b82f6;
            --text: #e5e7eb;
            --border: #262626;
            --drawer-w: 300px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        body { 
            background: var(--bg); color: var(--text); height: 100dvh; 
            display: flex; overflow: hidden; position: fixed; width: 100%; 
        }

        #container { display: flex; width: 100%; height: 100%; transition: all 0.3s ease; }
        #container.canvas-active #main { flex: 0.4; border-right: 1px solid var(--border); }
        #canvas-panel { flex: 0.6; display: none; background: #fff; position: relative; flex-direction: column; }
        #container.canvas-active #canvas-panel { display: flex; }

        .drawer {
            position: fixed; top: 0; bottom: 0; width: var(--drawer-w);
            background: var(--panel); border-right: 1px solid var(--border);
            z-index: 2000; display: flex; flex-direction: column;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
            padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
        }
        
        #drawer-left { left: 0; transform: translate3d(-105%, 0, 0); }
        #drawer-right { right: 0; transform: translate3d(105%, 0, 0); border-left: 1px solid var(--border); }
        .drawer.open { transform: translate3d(0, 0, 0) !important; }

        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            opacity: 0; pointer-events: none; transition: opacity 0.35s ease; 
            z-index: 1500; backdrop-filter: blur(8px);
        }
        #overlay.active { opacity: 1; pointer-events: auto; }

        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        header { 
            height: calc(60px + var(--safe-top)); 
            display: flex; align-items: flex-end; justify-content: space-between; 
            padding: 0 15px 12px; border-bottom: 1px solid var(--border); 
            background: rgba(10,10,10,0.8); backdrop-filter: blur(20px);
        }

        #output { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        #canvas-header { background: #f3f4f6; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        #canvas-frame { flex: 1; border: none; width: 100%; background: #fff; }
        .badge-live { background: #10b981; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: white; padding: 12px 18px; border-radius: 20px 20px 4px 20px; }
        .bot { align-self: flex-start; width: 100%; border-left: 2px solid var(--border); padding-left: 15px; color: #d1d5db; }

        pre { 
            background: #000; padding: 35px 15px 15px; border-radius: 12px; 
            margin: 15px 0; border: 1px solid var(--border); position: relative;
            overflow-x: auto;
        }
        .code-lang { position: absolute; top: 0; left: 0; background: var(--border); padding: 4px 12px; font-size: 10px; color: #aaa; border-radius: 0 0 8px 0; }
        .code-btn { font-size: 11px; color: var(--accent); cursor: pointer; font-weight: bold; padding: 5px; }
        
        .syn-key { color: #ff79c6; } .syn-str { color: #f1fa8c; } .syn-num { color: #bd93f9; }

        .input-area { padding: 12px 15px calc(12px + var(--safe-bottom)); background: var(--panel); border-top: 1px solid var(--border); }
        .bar { display: flex; align-items: flex-end; gap: 12px; max-width: 900px; margin: 0 auto; position: relative; }
        textarea { 
            flex: 1; background: #222; border: 1px solid var(--border); color: #fff; 
            border-radius: 22px; padding: 12px 18px; font-size: 16px; outline: none; resize: none;
            max-height: 180px; min-height: 46px;
        }

        .btn { background: none; border: none; cursor: pointer; color: #a3a3a3; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        #working-status { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--accent); display: none; }

        #preview-bar { background: #1a1a1a; padding: 10px 15px; display: none; align-items: center; border-top: 1px solid var(--border); gap: 10px; }
        .thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }

        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) {
            #container.canvas-active #main { display: none; }
            #container.canvas-active #canvas-panel { flex: 1; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeDrawers()"></div>

<div id="container">
    <aside id="drawer-left" class="drawer">
        <div style="padding: 24px 20px 15px; border-bottom: 1px solid var(--border);"><h3>History</h3></div>
        <div id="thread-list" style="flex: 1; overflow-y: auto;"></div>
        <div style="padding: 15px;"><button onclick="createNewThread()" style="width:100%; background:var(--accent); color:white; border:none; padding:14px; border-radius:12px; cursor:pointer;">+ New Chat</button></div>
    </aside>

    <aside id="drawer-right" class="drawer">
        <div style="padding: 24px 20px 15px; border-bottom: 1px solid var(--border);"><h3>Config</h3></div>
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="font-size: 10px; opacity: 0.5;">API KEY</label>
                <input type="password" id="set-key" placeholder="Gemini API Key" style="width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px;">
            </div>
            <div>
                <label style="font-size: 10px; opacity: 0.5;">ACTIVE MODEL</label>
                <select id="set-model" style="width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px;">
                    <option value="gemini-3-flash">Gemini 3 Flash</option>
                    <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-pro-preview">Gemini 2.5 Pro Preview</option>
                </select>
            </div>
            <button onclick="saveSettings()" style="background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;">Apply Changes</button>
        </div>
    </aside>

    <div id="main">
        <header>
            <button class="btn" onclick="openDrawer('left')">☰</button>
            <div style="font-weight: 700;">Elementa Pro</div>
            <button class="btn" onclick="openDrawer('right')">⚙️</button>
        </header>

        <div id="output"></div>

        <div id="preview-bar">
            <img id="p-img" class="thumb">
            <div id="p-name" style="flex: 1; font-size: 12px; opacity: 0.6;"></div>
            <button onclick="clearFile()" style="color: #ef4444; border:none; background:none;">✕</button>
        </div>

        <div class="input-area">
            <div class="bar">
                <div id="working-status">Gemini is processing...</div>
                <input type="file" id="f-hidden" hidden accept="image/*">
                <button class="btn" onclick="document.getElementById('f-hidden').click()">📎</button>
                <textarea id="user-input" placeholder="Type a message..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <button class="btn" onclick="handleSend()" style="color: var(--accent);">➤</button>
            </div>
        </div>
    </div>

    <div id="canvas-panel">
        <div id="canvas-header">
            <div><span class="badge-live">LIVE PREVIEW</span></div>
            <button onclick="toggleCanvas(false)" style="border:none; background:none; cursor:pointer; font-size: 20px;">✕</button>
        </div>
        <iframe id="canvas-frame"></iframe>
    </div>
</div>

<script>
    let chatHistory = JSON.parse(localStorage.getItem('el_v11_chats')) || [];
    let activeThreadId = localStorage.getItem('el_v11_active') || null;
    let stagedFile = null;
    let isRequesting = false;

    function highlight(code) {
        return code.replace(/\b(const|let|var|if|else|for|while|return|function|class|async|await)\b/g, '<span class="syn-key">$1</span>')
                   .replace(/(['"`])(.*?)\1/g, '<span class="syn-str">$1$2$1</span>')
                   .replace(/\b(\d+)\b/g, '<span class="syn-num">$1</span>');
    }

    function toggleCanvas(show) {
        document.getElementById('container').classList.toggle('canvas-active', show);
    }

    function updateCanvas(code) {
        const frame = document.getElementById('canvas-frame');
        let content = code.trim();
        if (!content.toLowerCase().includes('<html')) {
            content = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:20px;background:#fff;color:#000;}</style></head><body>${content}</body></html>`;
        }
        frame.srcdoc = content;
        toggleCanvas(true);
    }

    function mdParser(text) {
        if (!text) return "";
        return text
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const safeCode = code.trim();
                const canRender = ['html', 'javascript', 'css', 'svg', 'react'].includes(lang.toLowerCase()) || lang === '';
                return `<pre><div class="code-lang">${lang||'code'}</div>
                        <div style="position:absolute;top:5px;right:10px;display:flex;gap:10px;">
                            ${canRender ? `<div class="code-btn" onclick="updateCanvas(this.parentElement.parentElement.querySelector('code').innerText)">PREVIEW</div>` : ''}
                            <div class="code-btn" onclick="copySnippet(this)">COPY</div>
                        </div>
                        <code>${highlight(safeCode)}</code></pre>`;
            })
            .replace(/\n/g, '<br>');
    }

    function render(role, text, file = null) {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
        
        if (file && file.data) {
            const img = document.createElement('img');
            img.src = file.data;
            img.style = "max-width:260px; border-radius:12px; margin-bottom:12px; border: 1px solid var(--border);";
            div.appendChild(img);
        }

        const content = document.createElement('div');
        content.innerHTML = mdParser(text);
        div.appendChild(content);
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;

        if (role === 'bot') {
            const codeMatch = text.match(/```(?:html|)\n([\s\S]*?)```/i);
            if (codeMatch) updateCanvas(codeMatch[1]);
        }
    }
    async function handleSend() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const key = localStorage.getItem('el_key');
        const model = localStorage.getItem('el_model') || 'gemini-1.5-flash';

        if (!text || isRequesting) return;
        if (!key) return alert("Please set your API Key in Settings (⚙️)");

        isRequesting = true;
        abortController = new AbortController();
        document.getElementById('stop-btn').style.display = 'block';

        // Initialize new conversation if none is active
        if (!currentConversationId) {
            const newId = Date.now().toString();
            conversations.unshift({ // Add to the beginning for chronological display in history
                id: newId,
                title: text.substring(0, 50) + (text.length > 50 ? '...' : ''), // Initial title from first message
                messages: []
            });
            currentConversationId = newId;
            saveConversations();
            renderHistoryDrawer();

    async function handleSend() {
        if (isRequesting) return;
        const field = document.getElementById('user-input');
        const text = field.value.trim();
        const key = localStorage.getItem('el_key');
        const model = localStorage.getItem('el_model') || 'gemini-3-flash';

        if (!key) { alert("Please set your API Key in Settings."); return; }
        if (!text && !stagedFile) return;

        isRequesting = true;
        document.getElementById('working-status').style.display = 'block';
        
        render('user', text, stagedFile);
        const currentFile = stagedFile;
        clearFile();
        field.value = ''; 
        field.style.height = '46px';
        
        let thread = chatHistory.find(t => t.id === activeThreadId);
        if (!thread) { createNewThread(); thread = chatHistory[0]; }
        thread.messages.push({ role: 'user', content: text, file: currentFile });

        const loader = document.createElement('div');
        loader.className = 'msg bot';
        loader.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        document.getElementById('output').appendChild(loader);

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: thread.messages.map(m => ({
                        role: m.role === 'user' ? 'user' : 'model',
                        parts: [
                            { text: m.content || "Uploaded image context" },
                            ...(m.file ? [{ inline_data: { mime_type: m.file.type, data: m.file.data.split(',')[1] } }] : [])
                        ]
                    })),
                    systemInstruction: { parts: [{ text: "You are a professional full-stack developer. When asked to create apps or components, provide complete, production-ready code in ```html code blocks." }] }
                })
            });
            document.getElementById(thinkId).style.opacity = '0.5';
            document.getElementById(thinkId).querySelector('span').innerText = '✓ Thought complete';
            
            await streamResponse(botMsgDiv, reply);
} catch (e) {
    if (e.name !== 'AbortError') {
        botMsgDiv.innerHTML = "<i>Error: " + e.message + "</i>";
    }
} finally {
    isRequesting = false;
    document.getElementById('stop-btn').style.display = 'none';
}
}
            loader.remove();
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const reply = data.candidates[0].content.parts[0].text;
            thread.messages.push({ role: 'model', content: reply });
            if (thread.title === "New Chat") thread.title = text.slice(0, 30) || "Image Analysis";
            
            render('bot', reply);
            saveData();
        } catch (e) {
            if (loader) loader.remove();
            render('bot', "Error: " + e.message);
        } finally {
            isRequesting = false;
            document.getElementById('working-status').style.display = 'none';
        }
    }

    function saveData() {
        localStorage.setItem('el_v11_chats', JSON.stringify(chatHistory));
        localStorage.setItem('el_v11_active', activeThreadId);
        renderHistory();
    }

    function createNewThread() {
        const id = 't_' + Date.now();
        chatHistory.unshift({ id, title: 'New Chat', messages: [] });
        activeThreadId = id;
        document.getElementById('output').innerHTML = '';
        toggleCanvas(false);
        saveData();
        closeDrawers();
    }

    function switchThread(id) {
        activeThreadId = id;
        const thread = chatHistory.find(t => t.id === id);
        document.getElementById('output').innerHTML = '';
        if (thread) thread.messages.forEach(m => render(m.role, m.content, m.file));
        saveData();
        closeDrawers();
    }

    function renderHistory() {
        const list = document.getElementById('thread-list');
        list.innerHTML = chatHistory.map(t => `<div style="padding:15px; border-bottom:1px solid #222; cursor:pointer; font-size:14px; ${t.id === activeThreadId ? 'color:var(--accent)' : ''}" onclick="switchThread('${t.id}')">${t.title}</div>`).join('');
    }

    function openDrawer(id) { document.getElementById('drawer-'+id).classList.add('open'); document.getElementById('overlay').classList.add('active'); }
    function closeDrawers() { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById('overlay').classList.remove('active'); }
    
    function saveSettings() {
        localStorage.setItem('el_key', document.getElementById('set-key').value);
        localStorage.setItem('el_model', document.getElementById('set-model').value);
        closeDrawers();
    }

    window.copySnippet = (b) => {
        const code = b.closest('pre').querySelector('code').innerText;
        navigator.clipboard.writeText(code);
        b.innerText = 'COPIED';
        setTimeout(() => b.innerText = 'COPY', 2000);
    };

    document.getElementById('f-hidden').onchange = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            stagedFile = { data: ev.target.result, type: f.type, name: f.name };
            document.getElementById('preview-bar').style.display = 'flex';
            document.getElementById('p-img').src = stagedFile.data;
            document.getElementById('p-name').innerText = f.name;
        };
        r.readAsDataURL(f);
    };

    function clearFile() { stagedFile = null; document.getElementById('preview-bar').style.display = 'none'; }

    window.onload = () => {
        document.getElementById('set-key').value = localStorage.getItem('el_key') || '';
        document.getElementById('set-model').value = localStorage.getItem('el_model') || 'gemini-3-flash';
        if (chatHistory.length) switchThread(activeThreadId || chatHistory[0].id); else createNewThread();
    };
    
    // functions added
    
    function deleteConversation(idToDelete) {
        if (confirm("Are you sure you want to delete this conversation?")) {
            conversations = conversations.filter(conv => conv.id !== idToDelete);
            saveConversations();
            if (currentConversationId === idToDelete) {
                newConversation(); // If deleted the active one, start fresh
            }
            renderHistoryDrawer();
        }
    }
     // Add Thinking Box
        const thinkId = 'think-' + Date.now();
        out.innerHTML += `
            <div class="thinking-box" id="${thinkId}" onclick="this.classList.toggle('expanded')">
                <span>✨ Gemini is thinking...</span>
                <div class="thinking-details">Processing tokens, analyzing context, and generating response structure...</div>
            </div>`;
        
        

</script>
</body>
</html>
